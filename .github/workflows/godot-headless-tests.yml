name: Godot Headless Tests

on:
  push:
    branches: [ main, 'impl/*' ]
  pull_request:
    branches: [ main ]

env:
  GODOT_VERSION: '4.6.1'
  GODOT_FILENAME: 'Godot_v4.6.1-stable_linux.x86_64'
  GODOT_ZIP: 'Godot_v4.6.1-stable_linux.x86_64.zip'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot headless (if cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -e
          echo "Downloading Godot $GODOT_VERSION"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          wget -q -O godot.zip "$GODOT_URL"
          unzip -q godot.zip -d godot
          chmod +x godot/${GODOT_FILENAME}
          if [ -n "${{ secrets.GODOT_CHECKSUM }}" ]; then
            echo "Verifying checksum"
            echo "${{ secrets.GODOT_CHECKSUM }}  godot/${GODOT_FILENAME}" | sha256sum -c - || (echo 'Checksum mismatch' && exit 1)
          fi
        shell: bash

      - name: Install Python deps
        run: |
          python -m pip install -r requirements.txt || true

      - name: Run Godot headless tests
        run: |
          ./godot/${GODOT_FILENAME} --headless --path . --script 'res://tests/unit/test_runner.gd'
        shell: bash
