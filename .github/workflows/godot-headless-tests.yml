name: Godot Headless Tests

on:
  push:
    branches: [ main, 'impl/*' ]
  pull_request:
    branches: [ main ]

env:
  GODOT_VERSION: '4.6.1-stable'
  GODOT_FILENAME: 'Godot_v4.6.1-stable_linux.x86_64'
  GODOT_ZIP: 'Godot_v4.6.1-stable_linux.x86_64.zip'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Skip Godot download and headless tests
        run: |
          echo "Skipping Godot download and headless tests on GitHub Actions per user request."
          echo "Run tests locally using your Godot binary. See ci/PR_INSTRUCTIONS.md for details."
        shell: bash
